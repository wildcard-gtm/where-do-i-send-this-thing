<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 11px; color: #888; margin-bottom: 16px; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 16px;
    }
    .stat {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
    .stat-label { font-size: 9px; color: #888; margin-top: 2px; }
    .stat-value.green { color: #22c55e; }
    .stat-value.blue { color: #3b82f6; }
    .stat-value.yellow { color: #eab308; }
    #status {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
      min-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .log {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px;
      font-size: 10px;
      font-family: monospace;
      color: #888;
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #222; }
    .log-entry.success { color: #22c55e; }
    .log-entry.error { color: #ef4444; }
    .log-entry.warn { color: #eab308; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    #startBtn { background: #22c55e; color: white; }
    #startBtn:hover { background: #16a34a; }
    #startBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    #stopBtn { background: #ef4444; color: white; display: none; }
    #stopBtn:hover { background: #dc2626; }
  </style>
</head>
<body>
  <h1>WDISTT Photo Refresh</h1>
  <p class="subtitle">Refreshes photos for 48 specific leads — skips placeholders</p>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalVal">48</div>
      <div class="stat-label">Leads</div>
    </div>
    <div class="stat">
      <div class="stat-value blue" id="processedVal">0</div>
      <div class="stat-label">Processed</div>
    </div>
    <div class="stat">
      <div class="stat-value green" id="foundVal">0</div>
      <div class="stat-label">Uploaded</div>
    </div>
    <div class="stat">
      <div class="stat-value yellow" id="skippedVal">0</div>
      <div class="stat-label">Skipped</div>
    </div>
  </div>

  <div id="status">Ready. Click Start to begin.</div>

  <div class="log" id="log"></div>

  <button id="startBtn">Start Photo Refresh</button>
  <button id="stopBtn">Stop</button>
  <button id="copyLogsBtn" style="margin-top:8px;background:#333;color:#888;font-size:11px;padding:6px;">Copy Debug Logs</button>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
